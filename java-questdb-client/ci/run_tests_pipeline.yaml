trigger: none

pr:
  branches:
    include:
      - main

variables:
  ARCHIVED_LOGS: "$(Build.ArtifactStagingDirectory)/questdb-$(Build.SourceBranchName)-$(Build.SourceVersion)-$(System.StageAttempt)-$(Agent.OS).zip"
  DIFF_COVER_THRESHOLD_PCT: 50

stages:
  - stage: CheckChanges
    displayName: "Check Changes"
    jobs:
      - template: check-changes.yaml

  - stage: Validate
    displayName: "Validation"
    jobs:
      - job: Javadoc
        displayName: "Javadoc"
        pool: hetzner-incus
        variables:
          jdkArch: "x64"
          imageName: "ubuntu-latest"
        steps:
          - checkout: self
            fetchDepth: 0
            lfs: false
            submodules: false
          - bash: |
              git fetch origin $(System.PullRequest.SourceBranch)
              git checkout FETCH_HEAD
            displayName: "Checkout PR source branch"
            condition: eq(variables['Build.Reason'], 'PullRequest')
          - template: setup.yaml
          - bash: mvn -f core/pom.xml javadoc:javadoc -Pjavadoc --batch-mode
            displayName: "Verify Javadoc"

  - stage: BuildAndTest
    displayName: "Building and testing"
    dependsOn: Validate
    jobs:
      - job: RunOn
        displayName: "on"
        strategy:
          matrix:
            linux-x64:
              imageName: "ubuntu-latest"
              poolName: "hetzner-incus"
              jdkArch: "x64"
            mac-aarch64:
              imageName: "macos-15-arm64"
              poolName: "Azure Pipelines"
              jdkArch: "arm64"
            windows-msvc-2022-x64:
              imageName: "windows-2022"
              poolName: "Azure Pipelines"
              jdkArch: "x64"
        pool:
          name: $(poolName)
          vmImage: $(imageName)
        timeoutInMinutes: 60
        steps:
          - checkout: self
            fetchDepth: 1
            lfs: false
            submodules: false
          - template: setup.yaml
          - bash: echo "##vso[task.setvariable variable=HOME]$USERPROFILE"
            displayName: "Set HOME on Windows"
            condition: eq(variables['Agent.OS'], 'Windows_NT')
          - task: Cache@2
            inputs:
              key: 'maven | "$(Agent.OS)" | **/pom.xml'
              restoreKeys: |
                maven | "$(Agent.OS)"
              path: $(HOME)/.m2/repository
            displayName: "Cache Maven repository"
          # Compile the native libquestdb shared library on the runner; no
          # platform's binary is committed anymore. Must run before the client
          # jar is installed so the freshly built lib is packaged into it. The
          # template builds the right artifact for the current native agent --
          # Linux (.so), Windows (.dll), and macOS (.dylib) alike (see
          # build_native.yaml).
          - template: build_native.yaml
          - bash: |
              BRANCH="${SYSTEM_PULLREQUEST_SOURCEBRANCH:-$BUILD_SOURCEBRANCHNAME}"
              BRANCH="${BRANCH#refs/heads/}"
              if git ls-remote --exit-code --heads https://github.com/questdb/questdb.git "$BRANCH" >/dev/null 2>&1; then
                echo "Cloning matching questdb branch: $BRANCH"
                git clone --depth 1 --branch "$BRANCH" https://github.com/questdb/questdb.git ./questdb
              else
                echo "No matching questdb branch '$BRANCH', falling back to master"
                git clone --depth 1 https://github.com/questdb/questdb.git ./questdb
              fi
            displayName: git clone questdb
          - task: Maven@3
            displayName: "Update client version"
            inputs:
              mavenPOMFile: "core/pom.xml"
              jdkVersionOption: "default"
              goals: "versions:set"
              options: "-DnewVersion=9.9.9 -DgenerateBackupPoms=false --batch-mode"
          - task: Maven@3
            displayName: "Install client to local repo"
            inputs:
              mavenPOMFile: "core/pom.xml"
              jdkVersionOption: "default"
              goals: "install"
              options: "-DskipTests --batch-mode"
          - bash: |
              sed -i.bak 's|<questdb.client.version>.*</questdb.client.version>|<questdb.client.version>9.9.9</questdb.client.version>|' \
                questdb/core/pom.xml questdb/benchmarks/pom.xml questdb/utils/pom.xml
              rm -f questdb/core/pom.xml.bak questdb/benchmarks/pom.xml.bak questdb/utils/pom.xml.bak
            displayName: "Update QuestDB client version to 9.9.9"
          - task: Maven@3
            displayName: "Compile QuestDB"
            inputs:
              mavenPOMFile: "questdb/pom.xml"
              jdkVersionOption: "default"
              options: "-DskipTests -Pbuild-web-console --batch-mode"
          - template: run_client_tests.yaml
          - template: run_oss_tests.yaml

  - stage: Coverage
    displayName: "Coverage Report"
    dependsOn:
      - CheckChanges
    jobs:
      - job: CoverageReport
        displayName: "Coverage Report"
        pool: hetzner-incus
        variables:
          JAVA_SOURCE_CHANGED: $[stageDependencies.CheckChanges.CheckChanges.outputs['check_coverage.JAVA_SOURCE_CHANGED']]
          jdkArch: "x64"
          imageName: "ubuntu-latest"
        condition: and(eq(variables['JAVA_SOURCE_CHANGED'], 'true'), eq(variables['System.PullRequest.IsFork'], 'false'))
        timeoutInMinutes: 30
        steps:
          - checkout: self
            fetchDepth: 1
            lfs: false
            submodules: false
            persistCredentials: true
          - template: setup.yaml
          - task: Cache@2
            inputs:
              key: 'maven | "$(Agent.OS)" | **/pom.xml'
              restoreKeys: |
                maven | "$(Agent.OS)"
              path: $(HOME)/.m2/repository
            displayName: "Cache Maven repository"
          # Native binaries are no longer committed; compile libquestdb.so on the
          # runner so the coverage test run can load it (same as BuildAndTest).
          - template: build_native.yaml
          - task: Maven@3
            displayName: "Run tests with coverage"
            inputs:
              mavenPOMFile: "core/pom.xml"
              jdkVersionOption: "default"
              goals: "test"
              options: "-P jacoco --batch-mode"
          - bash: |
              set -eux
              git fetch origin $(System.PullRequest.targetBranchName)
              git diff origin/$(System.PullRequest.targetBranchName)..HEAD > pr.diff

              $JAVA_HOME/bin/java -jar $(Build.SourcesDirectory)/ci/cover-checker-1.5.0-all.jar \
                -dt file -d pr.diff \
                -type jacoco --cover core/target/site/jacoco/jacoco.xml \
                --repo "questdb/java-questdb-client" \
                --pr $(System.PullRequest.PullRequestNumber) \
                -t $(DIFF_COVER_THRESHOLD_PCT) --github-token $(GH_TOKEN)
            displayName: "Post coverage report to GitHub"
            env:
              GH_TOKEN: $(GH_TOKEN)
          - task: ArchiveFiles@2
            displayName: "Tests failed -- Compress logs"
            condition: failed()
            inputs:
              rootFolderOrFile: "logs"
              includeRootFolder: false
              archiveFile: $(ARCHIVED_LOGS)
          - task: PublishBuildArtifacts@1
            displayName: "Tests failed -- Upload logs"
            condition: failed()
            inputs:
              pathToPublish: $(ARCHIVED_LOGS)
              artifactName: CoverageTestsLogs
